<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游美食推荐系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .food-card {
            transition: transform 0.2s;
        }
        .food-card:hover {
            transform: translateY(-4px);
        }
        select {
            background-color: #1e293b;
            border-color: #334155;
            color: white;
        }
        select:disabled {
            background-color: #0f172a;
            color: #94a3b8;
        }
        .chat-float-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            z-index: 50;
        }
        .chat-float-btn:hover {
            transform: scale(1.05);
        }
        .chat-float-btn a {
            display: block;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 56px;
            font-size: 28px;
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body class="text-white">
    <div class="max-w-6xl mx-auto px-4 py-10">
        <h1 class="text-3xl md:text-4xl font-bold text-center bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent mb-6">
            旅游美食推荐助手
        </h1>

        <div class="card rounded-xl p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-2 font-medium">1. 选择省份 / 地区</label>
                    <select id="province" class="w-full border border-slate-700 rounded-lg px-4 py-3 bg-slate-800">
                        <option value="">请选择省份</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2 font-medium">2. 选择城市</label>
                    <select id="city" disabled class="w-full border border-slate-700 rounded-lg px-4 py-3 bg-slate-800">
                        <option value="">请先选省份</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="foodContainer" class="hidden">
            <h2 id="cityTitle" class="text-xl font-semibold mb-4"></h2>
            <div id="foodList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </div>
    </div>

    <div class="chat-float-btn">
        <a href="/chat" target="_blank">💬</a>
    </div>

    <script>
        // 直辖市列表（无需二级城市选择）
        const municipalities = ["北京市", "上海市", "天津市", "重庆市"];

        // 加载省份列表到下拉框
        async function loadProvinces() {
            const res = await fetch("/api/provinces");
            const data = await res.json();
            const sel = document.getElementById("province");
            sel.innerHTML = '<option value="">请选择省份</option>';
            data.provinces.forEach(p => {
                const opt = document.createElement("option");
                opt.value = p;
                opt.textContent = p;
                sel.appendChild(opt);
            });
        }

        // 展示某个城市的美食（卡片形式）
        async function showFoodsForCity(city, title) {
            const container = document.getElementById("foodContainer");
            const listDiv = document.getElementById("foodList");
            const cityTitle = document.getElementById("cityTitle");
            listDiv.innerHTML = "";
            cityTitle.textContent = title;
            const res = await fetch(`/api/foods?city=${encodeURIComponent(city)}`);
            const data = await res.json();
            const foods = data.foods;
            if (foods.length === 0) {
                listDiv.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">暂无美食数据</div>';
            } else {
                foods.forEach(f => {
                    const card = document.createElement("div");
                    card.className = "card p-4 rounded-lg food-card";
                    // 根据辣度设置标签样式
                    let spicyClass = "bg-gray-600";
                    let spicyText = f.spicy || "未知";
                    if (spicyText.includes("重辣") || spicyText.includes("特辣")) spicyClass = "bg-red-700";
                    else if (spicyText.includes("中辣")) spicyClass = "bg-orange-600";
                    else if (spicyText.includes("微辣")) spicyClass = "bg-yellow-700";
                    else if (spicyText.includes("不辣")) spicyClass = "bg-green-700";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-cyan-300">${escapeHtml(f.name)}</h3>
                            <span class="text-xs px-2 py-1 rounded-full ${spicyClass}">${escapeHtml(spicyText)}</span>
                        </div>
                        <div class="text-sm text-gray-300 space-y-1">
                            <div>💰 人均：${escapeHtml(f.price || "—")}</div>
                            <div>👥 适合：${escapeHtml(f.crowd || "—")}</div>
                            <div class="mt-2 text-gray-400 text-xs">📝 ${escapeHtml(f.intro || "")}</div>
                        </div>
                    `;
                    listDiv.appendChild(card);
                });
            }
            container.classList.remove("hidden");
        }

        // 展示某个省份下所有城市的美食（聚合视图）
        async function showAllFoodsInProvince(province) {
            const container = document.getElementById("foodContainer");
            const listDiv = document.getElementById("foodList");
            const cityTitle = document.getElementById("cityTitle");
            listDiv.innerHTML = "";
            cityTitle.textContent = `🍜 ${province} 全部特色美食`;
            const res = await fetch(`/api/province_foods?province=${encodeURIComponent(province)}`);
            const data = await res.json();
            const foods = data.foods;
            if (foods.length === 0) {
                listDiv.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">暂无美食数据</div>';
            } else {
                foods.forEach(f => {
                    const card = document.createElement("div");
                    card.className = "card p-4 rounded-lg food-card";
                    let spicyClass = "bg-gray-600";
                    let spicyText = f.spicy || "未知";
                    if (spicyText.includes("重辣") || spicyText.includes("特辣")) spicyClass = "bg-red-700";
                    else if (spicyText.includes("中辣")) spicyClass = "bg-orange-600";
                    else if (spicyText.includes("微辣")) spicyClass = "bg-yellow-700";
                    else if (spicyText.includes("不辣")) spicyClass = "bg-green-700";
                    const cityInfo = f.city ? `<div class="text-xs text-cyan-400 mb-1">📍 ${escapeHtml(f.city)}</div>` : '';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-cyan-300">${escapeHtml(f.name)}</h3>
                            <span class="text-xs px-2 py-1 rounded-full ${spicyClass}">${escapeHtml(spicyText)}</span>
                        </div>
                        ${cityInfo}
                        <div class="text-sm text-gray-300 space-y-1">
                            <div>💰 人均：${escapeHtml(f.price || "—")}</div>
                            <div>👥 适合：${escapeHtml(f.crowd || "—")}</div>
                            <div class="mt-2 text-gray-400 text-xs">📝 ${escapeHtml(f.intro || "")}</div>
                        </div>
                    `;
                    listDiv.appendChild(card);
                });
            }
            container.classList.remove("hidden");
        }

        // 省份切换事件
        document.getElementById("province").addEventListener("change", async e => {
            const province = e.target.value;
            const citySel = document.getElementById("city");
            const container = document.getElementById("foodContainer");
            if (!province) {
                citySel.disabled = true;
                citySel.innerHTML = '<option value="">请选择城市</option>';
                container.classList.add("hidden");
                return;
            }
            // 直辖市特殊处理：无需城市下拉
            if (municipalities.includes(province)) {
                citySel.disabled = true;
                citySel.innerHTML = '<option value="">直辖市无需选择城市</option>';
                await showFoodsForCity(province, `🍜 ${province} 特色美食`);
            } else {
                const res = await fetch(`/api/cities?province=${encodeURIComponent(province)}`);
                const data = await res.json();
                let options = '<option value="__all__">🌍 全部（该省所有美食）</option>';
                options += '<option value="" selected disabled>请选择...</option>';
                data.cities.forEach(c => {
                    options += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
                });
                citySel.innerHTML = options;
                citySel.disabled = false;
                container.classList.add("hidden");
            }
        });

        // 城市切换事件
        document.getElementById("city").addEventListener("change", async e => {
            const selected = e.target.value;
            const province = document.getElementById("province").value;
            if (!selected || !province) return;
            if (selected === "__all__") {
                await showAllFoodsInProvince(province);
            } else {
                await showFoodsForCity(selected, `🍜 ${selected} 特色美食`);
            }
        });

        // 简单的 XSS 防护
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 页面启动：加载省份
        loadProvinces();
    </script>
</body>
</html>
